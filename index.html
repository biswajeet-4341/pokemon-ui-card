               <p id="gen">POKEMON GEN I</p>
               <h1>Pikachu</h1>
               <p class="text">
                  Pikachu is an Electric-type Pokémon introduced in Generation
                  I. Pikachu are small, chubby, and incredibly cute mouse-like
                  Pokémon. They are almost completely covered by yellow fur.
               </p>
